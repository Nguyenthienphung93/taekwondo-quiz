<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ lesson.title }}</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/lesson_review.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/lesson_drive_media.css', v=APP_VERSION) }}">
</head>

<body class="{{ body_class or '' }}">
  <div class="lesson-window">

    <div class="lesson-modal-header">
      <div class="lesson-header-left">
        <h1 class="lesson-title-text">{{ lesson.title }}</h1>
      </div>
      <button class="lesson-close" onclick="closeLesson()" title="Thoát">❌</button>
    </div>

    <div class="lesson-body">
      <main class="lesson-content">
        <div class="media-wrap">

          {% if drive_kind == "video" %}
            <video id="html5Player" playsinline></video>
          {% else %}
            <audio id="html5Player"></audio>
          {% endif %}

        </div>
      </main>
    </div>

    <div class="video-footer">
      <button class="vbtn" id="btnPlay" title="Bắt đầu">▶</button>
      <div class="vtime"><span id="vCur">0:00</span> / <span id="vDur">0:00</span></div>
      <input id="vSeek" class="vseek" type="range" min="0" max="1000" value="0">
      <button class="vbtn gray" onclick="toggleFullscreen()" title="Mở màn hình">⛶</button>
    </div>
  </div>

  <script>
    window.DRIVE_KIND = {{ drive_kind|tojson }};
    window.DRIVE_DIRECT_URL = {{ drive_direct_url|tojson }};
  </script>
  <script src="{{ url_for('static', filename='js/lesson-drive-media.js', v=APP_VERSION) }}"></script>

  <script>
    function closeLesson(){
      if (window.history.length > 1) window.history.back();
      else window.close();
    }
    function toggleFullscreen(){
      const box = document.querySelector(".lesson-window");
      if(!document.fullscreenElement) box?.requestFullscreen?.();
      else document.exitFullscreen?.();
    }
  </script>
</body>
</html>
