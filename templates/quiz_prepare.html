{% extends "base.html" %}
{% block title %}Bài ôn{% endblock %}

{% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/quiz_prepare.css', v=APP_VERSION) }}">
{% endblock %}

{% block content %}
<div class="start-overlay" id="startOverlay">
  <div class="start-box" role="dialog" aria-modal="true" aria-label="Bắt đầu ôn tập">
    <!-- ❌ THOÁT -->
    <button class="ui-close" id="btnClose" type="button" aria-label="Thoát" title="Thoát">❌</button>

    <div class="start-badge">🎯 Ôn tập</div>
    <h2 class="start-title">{{ topic_name }}</h2>

    <button class="start-btn" id="btnStart" type="button">
      <span class="start-icon">▶</span>
      <span class="start-text">BẮT ĐẦU</span>
    </button>

    <div class="start-hint">
      Nhấn <b>BẮT ĐẦU</b> để vào bài. Chuẩn bị sẵn sàng nhé!
    </div>
  </div>
</div>

<!-- COUNTDOWN -->
<div class="countdown-overlay" id="countdown" aria-hidden="true">
  <div class="countdown-number" id="countNum">3</div>
</div>

<audio id="countdownSound" src="{{ url_for('static', filename='sounds/Countdown.mp3') }}" preload="auto"></audio>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const startUrl  = "{{ start_url }}";
  const btnStart  = document.getElementById("btnStart");
  const btnClose  = document.getElementById("btnClose");
  const overlay   = document.getElementById("startOverlay");

  const countdown = document.getElementById("countdown");
  const num       = document.getElementById("countNum");
  const sound     = document.getElementById("countdownSound");

  function goStart(){
    window.location.href = startUrl;
  }

  function showCountdown(){
    overlay.style.display = "none";
    countdown.style.display = "flex";
    countdown.setAttribute("aria-hidden", "false");

    // reset
    num.textContent = "3";
    num.style.animation = "none"; // restart animation
    void num.offsetWidth;
    num.style.animation = "";

    // tick text + pop animation
    const show = (t) => {
      num.textContent = t;
      num.style.animation = "none";
      void num.offsetWidth;
      num.style.animation = "";
    };

    setTimeout(() => show("2"), 1000);
    setTimeout(() => show("1"), 2000);
    setTimeout(() => show("BẮT ĐẦU"), 3000);

    // fallback chuyển trang theo thời gian (phòng audio không chạy)
    setTimeout(goStart, 3800);
  }

  // ❌ THOÁT
  btnClose?.addEventListener("click", () => history.back());

  // ▶️ BẮT ĐẦU
  btnStart?.addEventListener("click", async () => {
    showCountdown();

    // cố gắng phát audio (có tương tác click nên thường OK)
    try{
      sound.currentTime = 0;
      await sound.play();
      // nếu play được => ưu tiên chuyển khi audio ended (chuẩn nhất)
      sound.addEventListener("ended", goStart, { once:true });
    }catch(e){
      // autoplay bị chặn: fallback timer đã set ở showCountdown()
    }
  });
});
</script>
{% endblock %}
