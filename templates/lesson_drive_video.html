<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ lesson.title }}</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/lesson_review.css') }}">

  <style>
    html, body{ height:100%; margin:0; overflow:hidden; background:#f6f7fb; }
    .lesson-window{ width:100vw; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    /* Header giống audio */
    .lesson-modal-header{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 18px;
      background:#f59e0b;
      color:#fff;
    }
    .lesson-title-text{ margin:0; font-size:22px; font-weight:900; }
    .lesson-close{
      width:38px;height:38px;border-radius:10px;
      border:1px solid rgba(0,0,0,.18);
      background:#fff; cursor:pointer; font-size:18px;
    }

    .lesson-body{ flex:1 1 auto; min-height:0; display:flex; overflow:hidden; background:#eef2f7; }
    .lesson-content{ flex:1 1 auto; min-height:0; display:flex; padding:12px; overflow:hidden; }

    /* Stage video */
    .video-stage{
      width:100%;
      height:100%;
      min-height:0;
      position:relative;
      border-radius:18px;
      overflow:hidden;
      background: radial-gradient(1200px 600px at 50% 0%, rgba(59,130,246,.18), transparent 55%),
                  radial-gradient(900px 500px at 10% 90%, rgba(249,115,22,.14), transparent 60%),
                  #070b14;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 18px 45px rgba(0,0,0,.20);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px;
    }

    .video-player{
      width: 100%;
      height: 100%;
      border-radius:14px;
      overflow:hidden;
      background:#000;
      border:1px solid rgba(255,255,255,.10);
    }
    .video-player video{
      width:100%;
      height:100%;
      display:block;
      background:#000;
    }

    .video-hint{
      position:absolute;
      left:12px;
      top:10px;
      padding:8px 10px;
      border-radius:12px;
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.90);
      font-weight:900;
      backdrop-filter: blur(6px);
      border:1px solid rgba(255,255,255,.10);
      user-select:none;
      z-index:2;
    }

    /* Footer (nút giống audio) */
    .video-footer{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:12px 14px;
      background:#fff;
      border-top:1px solid rgba(0,0,0,.08);
    }

    .vbtn{
      border:0;
      padding:10px 14px;
      border-radius:14px;
      cursor:pointer;
      font-weight:900;
      height:44px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      background:#e5e7eb;
      color:#111827;
      transition: transform .10s ease, box-shadow .10s ease, filter .15s ease;
      box-shadow:0 10px 18px rgba(0,0,0,.10);
    }
    .vbtn:hover{ filter:brightness(1.05); }
    .vbtn:active{ transform: translateY(2px) scale(0.98); box-shadow:0 6px 12px rgba(0,0,0,.12); }

    .vbtn.seek{ background:#dbeafe; color:#1d4ed8; }
    .vbtn.play{ background:#16a34a; color:#fff; }
    .vbtn.stop{ background:#ef4444; color:#fff; }
    .vbtn.full{ background:#111827; color:#fff; }

    @media (max-width: 720px){
      .lesson-title-text{ font-size:18px; }
      .video-stage{ padding:8px; border-radius:14px; }
      .video-player{ border-radius:12px; }
      .vbtn{ padding:10px 12px; }
    }

    /* ✅ FIX: DRIVE VIDEO phải full-width (đè layout PDF) */
    body.is-drive-video .lesson-body{
      display:flex !important;
    }

    body.is-drive-video .lesson-content{
      width:100% !important;
      max-width:none !important;
      padding:12px !important;
      justify-content:stretch !important;
    }

    body.is-drive-video .video-stage{
      width:100% !important;
      height:100% !important;
    }

    /* ✅ Video box full (không min(1280px)) */
    body.is-drive-video .video-player{
      width:100% !important;
      height:100% !important;
      max-width:none !important;
    }

    /* ✅ Video fill khung, không méo */
    body.is-drive-video .video-player video{
      width:100% !important;
      height:100% !important;
      object-fit: contain;   /* nếu muốn phủ kín: cover */
    }
  </style>
</head>

<body class="is-drive is-drive-video">
  <div class="lesson-window">

    <div class="lesson-modal-header">
      <h1 class="lesson-title-text">{{ lesson.title }}</h1>
      <button class="ui-close" onclick="closeLesson()" title="Thoát">❌</button>
    </div>

    <div class="lesson-body">
      <main class="lesson-content">
        <div class="video-stage">
          <div class="video-hint">🎬 Đang xem: {{ lesson.title }}</div>

          <div class="video-player">
            <video id="vPlayer" controls playsinline preload="metadata">
              <source src="{{ drive_direct_url }}" type="video/mp4">
            </video>
          </div>
        </div>
      </main>
    </div>

    <div class="video-footer">
      <button class="vbtn seek" id="btnBack10" title="10s">⏪</button>
      <button class="vbtn play" id="btnPlay" title="Bắt đầu">▶</button>
      <button class="vbtn stop" id="btnStop" title="Dừng">⏹</button>
      <button class="vbtn seek" id="btnFwd10" title="10s">⏩</button>
      <button class="vbtn full" id="btnFull">⛶ Fullscreen</button>
    </div>

  </div>

  <script>
    function closeLesson(){
      if (window.history.length > 1) window.history.back();
      else window.close();
    }

    (function(){
      const v = document.getElementById("vPlayer");
      const btnPlay = document.getElementById("btnPlay");
      const btnStop = document.getElementById("btnStop");
      const btnBack10 = document.getElementById("btnBack10");
      const btnFwd10 = document.getElementById("btnFwd10");
      const btnFull = document.getElementById("btnFull");

      function setIcon(){
        if(!btnPlay || !v) return;
        btnPlay.textContent = v.paused ? "▶" : "⏸";
        btnPlay.style.background = v.paused ? "#16a34a" : "#facc15";
        btnPlay.style.color = v.paused ? "#fff" : "#111827";
      }

      btnPlay?.addEventListener("click", () => {
        if (!v) return;
        if (v.paused) v.play().catch(()=>{});
        else v.pause();
        setIcon();
      });

      btnStop?.addEventListener("click", () => {
        if (!v) return;
        v.pause();
        v.currentTime = 0;
        setIcon();
      });

      btnBack10?.addEventListener("click", () => {
        if (!v) return;
        v.currentTime = Math.max(0, (v.currentTime || 0) - 10);
      });

      btnFwd10?.addEventListener("click", () => {
        if (!v) return;
        v.currentTime = Math.min(v.duration || Infinity, (v.currentTime || 0) + 10);
      });

      btnFull?.addEventListener("click", () => {
        const box = document.querySelector(".video-player");
        if(!document.fullscreenElement) box?.requestFullscreen?.();
        else document.exitFullscreen?.();
      });

      v?.addEventListener("play", setIcon);
      v?.addEventListener("pause", setIcon);
      v?.addEventListener("ended", setIcon);

      setIcon();
    })();
  </script>
</body>
</html>
