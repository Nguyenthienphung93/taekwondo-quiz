<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>{{ lesson.title }}</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/lesson_review.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/lesson_video.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ui.css') }}">
</head>
<body class="lesson-web-page">

<div class="lesson-window lesson-web-window">

  <!-- HEADER -->
  <div class="lesson-modal-header lesson-web-header">
    <div class="lesson-header-left">
      <h1 class="lesson-title-text">{{ lesson.title }}</h1>
    </div>
    <button class="ui-close" onclick="closeLesson()" title="Thoát">❌</button>
  </div>

  <!-- BODY: full iframe -->
  <div class="lesson-web-body">
    <main class="lesson-web-stage">
      <iframe
        class="lesson-web-iframe"
        src="{{ iframe_url }}"
        frameborder="0"
        allowfullscreen
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </main>
  </div>

</div>

<script>
function closeLesson(){
  if (window.history.length > 1) window.history.back();
  else window.close();
}
</script>

</body>
</html>
