{% extends "base.html" %}
{% block title %}Admin – Thêm câu hỏi{% endblock %}

{% block content %}


<div class="card" style="max-width:900px;margin:0 auto;">

  <h2 style="margin-top:0;">➕ Thêm câu hỏi</h2>

  <div style="margin-bottom:16px;display:flex;gap:10px;">
    <a class="admin-btn ui-btn--gray" href="/admin/questions">📋 Quản lý câu hỏi</a>
    <a class="admin-btn ui-btn--gray" href="/sets">⬅ Về Bài ôn</a>
  </div>

  <form method="POST">

    <!-- ===== CHỦ ĐỀ ===== -->
    <div class="form-row">
      <label>Chủ đề</label>
      <select name="topic_id" required>
        {% for t in topics %}
          <option value="{{ t.id }}">
            {{ t.set.title }} — {{ t.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <!-- ===== CÂU HỎI ===== -->
    <div class="form-row">
      <label>Câu hỏi</label>
      <textarea name="question_text" rows="3" required></textarea>
    </div>

    <!-- ===== ĐÁP ÁN ===== -->
    <div class="form-row">
      <label>Đáp án A</label>
      <input name="a" required>
    </div>

    <div class="form-row">
      <label>Đáp án B</label>
      <input name="b" required>
    </div>

    <div class="form-row">
      <label>Đáp án C</label>
      <input name="c" required>
    </div>

    <div class="form-row">
      <label>Đáp án D</label>
      <input name="d" required>
    </div>

    <!-- ===== ĐÁP ÁN ĐÚNG ===== -->
    <div class="form-row">
      <label>Đáp án đúng</label>
      <select name="correct" required>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
      </select>
    </div>

    <!-- ===== ACTION ===== -->
    <div style="margin-top:20px;display:flex;justify-content:flex-end;">
      <button class="btn" type="submit">➕ Thêm câu hỏi</button>
    </div>

  </form>
</div>

{% endblock %}
