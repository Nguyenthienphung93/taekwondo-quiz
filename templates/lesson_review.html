<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ lesson.title }}</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/lesson_review.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/lesson.css') }}">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body>

<div class="lesson-window">

  <!-- ===================================================== -->
  <!-- HEADER -->
  <!-- ===================================================== -->
  <div class="lesson-modal-header">
    <div class="lesson-header-left">
      <h1 class="lesson-title-text">{{ lesson.title }}</h1>
    </div>

    <button type="button"
            class="ui-close"
            onclick="closeLesson()"
            aria-label="Đóng"
            title="Thoát">❌</button>
  </div>

  <!-- ===================================================== -->
  <!-- BODY -->
  <!-- ===================================================== -->
  <div class="lesson-body">

    <!-- ===== PDF VIEW ===== -->
    <main class="lesson-content" id="lessonContent">

      <!-- MENU nổi trong khung PDF -->
      <button id="floatingMenuBtn"
              class="floating-menu-btn pdf-overlay-menu"
              type="button"
              onclick="toggleSidebar()"
              title="Mở mục lục"
              aria-label="Mở mục lục">
        ☰
      </button>

      <!-- SIDEBAR PHẢI ĐẶT BÊN TRONG lessonContent -->
      <aside id="lessonSidebar" class="lesson-sidebar collapsed">
        <div class="lesson-sidebar-inner">
          {% for s in sections %}
            <button class="lesson-nav-btn {% if loop.first %}active{% endif %}"
                    type="button"
                    onclick="loadSection({{ loop.index0 }}); closeSidebar();">
              {{ s.title }}
            </button>
          {% endfor %}
        </div>
      </aside>

      <canvas id="pdfCanvas"></canvas>

      <!-- Nút lùi trang -->
      <button id="btnPrev"
              type="button"
              class="pdf-side-nav pdf-side-nav--left"
              onclick="prevPage()"
              title="Lùi trang"
              aria-label="Lùi trang">
        ◀
      </button>

      <!-- Nút qua trang -->
      <button id="btnNext"
              type="button"
              class="pdf-side-nav pdf-side-nav--right"
              onclick="nextPage()"
              title="Qua trang"
              aria-label="Qua trang">
        ▶
      </button>

      <!-- Số trang -->
      <div class="pdf-page-indicator">
        <span id="pageNow">1</span>
        <span class="sep">/</span>
        <span id="pageTotal">1</span>
      </div>

      <!-- Nút fullscreen -->
      <button type="button"
              class="pdf-fullscreen-btn"
              onclick="toggleFullscreen()"
              title="Toàn màn hình"
              aria-label="Toàn màn hình">
        ⛶
      </button>

    </main>
  </div>

</div>

<!-- ===================================================== -->
<!-- DATA FROM FLASK -->
<!-- ===================================================== -->
<script>
  window.LESSON_DATA = {
    slug: {{ lesson.slug | tojson }},
    title: {{ lesson.title | tojson }},
    pdf: {{ (pdf_url or ('/static/' ~ (lesson.pdf or 'Bai_hoc.pdf'))) | tojson }},
    review_type: {{ (lesson.review_type or "pdf") | tojson }},
    source_url: {{ (lesson.source_url or "") | tojson }},
    sections: {{ (sections or []) | tojson }}
  };
</script>

<!-- ===================================================== -->
<!-- SCRIPT -->
<!-- ===================================================== -->
<script src="{{ url_for('static', filename='js/lesson-review.js') }}"></script>


<script>
(function(){
  const lessonWindow = document.querySelector('.lesson-window');
  const lessonContent = document.querySelector('.lesson-content');
  const headerActions = document.querySelector('.lesson-header-actions');
  const pdfCanvas = document.getElementById('pdfCanvas');

  if (!lessonWindow || !lessonContent) return;

  // ===== 1) Tự thêm nút fullscreen nếu chưa có =====
  let fsBtn = document.querySelector('.lesson-fullscreen-btn');
  if (!fsBtn && headerActions) {
    fsBtn = document.createElement('button');
    fsBtn.type = 'button';
    fsBtn.className = 'lesson-fullscreen-btn';
    fsBtn.title = 'Toàn màn hình';
    fsBtn.setAttribute('aria-label', 'Toàn màn hình');
    fsBtn.innerHTML = '⛶';
    headerActions.prepend(fsBtn);
  }

  async function enterFullscreen(el){
    try{
      if (el.requestFullscreen) {
        await el.requestFullscreen();
      } else if (el.webkitRequestFullscreen) {
        await el.webkitRequestFullscreen();
      } else {
        document.body.classList.toggle('is-fullscreen-mobile');
      }
    }catch(err){
      document.body.classList.toggle('is-fullscreen-mobile');
      console.log('fullscreen fallback:', err);
    }
  }

  async function exitFullscreen(){
    try{
      if (document.fullscreenElement && document.exitFullscreen) {
        await document.exitFullscreen();
      } else if (document.webkitFullscreenElement && document.webkitExitFullscreen) {
        await document.webkitExitFullscreen();
      } else {
        document.body.classList.remove('is-fullscreen-mobile');
      }
    }catch(err){
      document.body.classList.remove('is-fullscreen-mobile');
      console.log('exit fullscreen fallback:', err);
    }
  }

  if (fsBtn) {
    fsBtn.addEventListener('click', async function(){
      const active = !!(document.fullscreenElement || document.webkitFullscreenElement || document.body.classList.contains('is-fullscreen-mobile'));
      if (active) await exitFullscreen();
      else await enterFullscreen(lessonWindow);
    });
  }

  document.addEventListener('fullscreenchange', function(){
    document.body.classList.toggle('is-fullscreen-mobile', !!document.fullscreenElement);
  });

  // ===== 2) Mobile: cho phép pan / scroll tự nhiên trên vùng PDF =====
  lessonContent.style.webkitOverflowScrolling = 'touch';
  lessonContent.style.overflow = 'auto';
  lessonContent.style.touchAction = 'pan-x pan-y pinch-zoom';

  if (pdfCanvas) {
    pdfCanvas.style.touchAction = 'pan-x pan-y pinch-zoom';
  }

  // ===== 3) Vuốt ngang để đổi trang nhẹ nhàng (không bắt buộc) =====
  let startX = 0;
  let startY = 0;
  let moved = false;

  lessonContent.addEventListener('touchstart', function(e){
    const t = e.touches && e.touches[0];
    if (!t) return;
    startX = t.clientX;
    startY = t.clientY;
    moved = false;
  }, {passive:true});

  lessonContent.addEventListener('touchmove', function(){
    moved = true;
  }, {passive:true});

  lessonContent.addEventListener('touchend', function(e){
    const t = e.changedTouches && e.changedTouches[0];
    if (!t || !moved) return;

    const dx = t.clientX - startX;
    const dy = t.clientY - startY;

    // chỉ xử lý swipe ngang khi gần như không vuốt dọc
    if (Math.abs(dx) > 70 && Math.abs(dy) < 40) {
      const prevBtn = document.querySelector('.pdf-side-nav--left, .pager-btn.prev, [data-page-action="prev"]');
      const nextBtn = document.querySelector('.pdf-side-nav--right, .pager-btn.next, [data-page-action="next"]');

      if (dx > 0 && prevBtn) prevBtn.click();
      if (dx < 0 && nextBtn) nextBtn.click();
    }
  }, {passive:true});
})();
</script>

</body>
</html>
