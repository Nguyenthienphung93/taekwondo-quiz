<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ lesson.title }}</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/lesson_review.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/lesson.css') }}">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body>

<div class="lesson-window">

  <!-- ===================================================== -->
  <!-- HEADER -->
  <!-- ===================================================== -->
  <div class="lesson-modal-header">
    <div class="lesson-header-left">
      <h1 class="lesson-title-text">{{ lesson.title }}</h1>
    </div>

    <button type="button"
            class="ui-close"
            onclick="closeLesson()"
            aria-label="Đóng"
            title="Thoát">❌</button>
  </div>

  <!-- ===================================================== -->
  <!-- BODY -->
  <!-- ===================================================== -->
  <div class="lesson-body">

    <!-- ===== PDF VIEW ===== -->
    <main class="lesson-content" id="lessonContent">

      <!-- MENU nổi trong khung PDF -->
      <button id="floatingMenuBtn"
              class="floating-menu-btn pdf-overlay-menu"
              type="button"
              onclick="toggleSidebar()"
              title="Mở mục lục"
              aria-label="Mở mục lục">
        ☰
      </button>

      <!-- SIDEBAR PHẢI ĐẶT BÊN TRONG lessonContent -->
      <aside id="lessonSidebar" class="lesson-sidebar collapsed">
        <div class="lesson-sidebar-inner">
          {% for s in sections %}
            <button class="lesson-nav-btn {% if loop.first %}active{% endif %}"
                    type="button"
                    onclick="loadSection({{ loop.index0 }}); closeSidebar();">
              {{ s.title }}
            </button>
          {% endfor %}
        </div>
      </aside>

      <canvas id="pdfCanvas"></canvas>

      <!-- Nút lùi trang -->
      <button id="btnPrev"
              type="button"
              class="pdf-side-nav pdf-side-nav--left"
              onclick="prevPage()"
              title="Lùi trang"
              aria-label="Lùi trang">
        ◀
      </button>

      <!-- Nút qua trang -->
      <button id="btnNext"
              type="button"
              class="pdf-side-nav pdf-side-nav--right"
              onclick="nextPage()"
              title="Qua trang"
              aria-label="Qua trang">
        ▶
      </button>

      <!-- Số trang -->
      <div class="pdf-page-indicator">
        <span id="pageNow">1</span>
        <span class="sep">/</span>
        <span id="pageTotal">1</span>
      </div>

      <!-- Nút fullscreen -->
      <button type="button"
              class="pdf-fullscreen-btn"
              onclick="toggleFullscreen()"
              title="Toàn màn hình"
              aria-label="Toàn màn hình">
        ⛶
      </button>

    </main>
  </div>

</div>

<!-- ===================================================== -->
<!-- DATA FROM FLASK -->
<!-- ===================================================== -->
<script>
  window.LESSON_DATA = {
    slug: {{ lesson.slug | tojson }},
    title: {{ lesson.title | tojson }},
    pdf: {{ (pdf_url or ('/static/' ~ (lesson.pdf or 'Bai_hoc.pdf'))) | tojson }},
    review_type: {{ (lesson.review_type or "pdf") | tojson }},
    source_url: {{ (lesson.source_url or "") | tojson }},
    sections: {{ (sections or []) | tojson }}
  };
</script>

<!-- ===================================================== -->
<!-- SCRIPT -->
<!-- ===================================================== -->
<script src="{{ url_for('static', filename='js/lesson-review.js') }}"></script>
</body>
</html>
