<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>{{ lesson.title }}</title>

  <!-- CSS -->
  <link rel="stylesheet"
        href="{{ url_for('static', filename='css/lesson_review.css') }}">
  <link rel="stylesheet"
        href="{{ url_for('static', filename='css/lesson.css') }}">

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="{{ url_for('static', filename='js/admin_review.js') }}"></script>
</head>

<body>

<div class="lesson-window">

  <!-- ===================================================== -->
  <!-- HEADER -->
  <!-- ===================================================== -->
  <div class="lesson-modal-header">
    <div class="lesson-header-left">
      <h1 class="lesson-title-text">{{ lesson.title }}</h1>
    </div>

    <!-- ✅ nút X chuẩn UI -->
    <button type="button" class="ui-close" onclick="closeLesson()" aria-label="Đóng" title="Thoát">❌</button>
  </div>


  <!-- ===================================================== -->
  <!-- BODY -->
  <!-- ===================================================== -->
  <div class="lesson-body">

    <!-- ===== SIDEBAR ===== -->
    <aside class="lesson-sidebar">
      {% for s in sections %}
        <button class="lesson-nav-btn {% if loop.first %}active{% endif %}"
                type="button"
                onclick="loadSection({{ loop.index0 }})">
          {{ s.title }}
        </button>
      {% endfor %}
    </aside>


    <!-- ===== PDF VIEW ===== -->
    <main class="lesson-content">
      <canvas id="pdfCanvas"></canvas>
    </main>

  </div>


  <!-- ===================================================== -->
  <!-- PAGINATION -->
  <!-- ===================================================== -->
  <div class="lesson-pager">
    <button id="btnPrev" type="button" class="pager-btn" onclick="prevPage()" title="Lùi trang">◀</button>

    <div class="pager-pill">
      <span id="pageNow">1</span>
      <span class="sep">/</span>
      <span id="pageTotal">1</span>
    </div>

    <button id="btnNext" type="button" class="pager-btn" onclick="nextPage()" title="Qua trang">▶</button>
  </div>

</div>


<!-- ===================================================== -->
<!-- DATA FROM FLASK -->
<!-- ===================================================== -->
<script>
  window.LESSON_DATA = {
    slug: {{ lesson.slug | tojson }},
    title: {{ lesson.title | tojson }},
    pdf: {{ (lesson.pdf or "Bai_hoc.pdf") | tojson }},
    review_type: {{ (lesson.review_type or "pdf") | tojson }},
    source_url: {{ (lesson.source_url or "") | tojson }},
    sections: {{ (sections or []) | tojson }}
  };
</script>


<!-- ===================================================== -->
<!-- SCRIPT -->
<!-- ===================================================== -->
<script src="{{ url_for('static', filename='js/lesson-review.js') }}"></script>

</body>
</html>
